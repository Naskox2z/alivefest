<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Alive Fest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100hv;
            flex-direction: column;
            background-color: black;
            background-size: cover;
        }

        h1 {
            font-size: 6rem;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 7px 7px 20px whitesmoke;
        }

        .countdown {
            display: flex;
            gap: 30px;
        }

        .box {
            text-align: center;
        }

        .number {
            text-shadow: -8px -4px 20px white;
            font-size: 3rem;
            font-weight: bold;
            background: none;
        }

        .label {
            font-size: 1rem;
            opacity: 0.7;
            text-shadow: -8px -4px 10px white;
        }
    </style>
</head>

<body>
    <h1>Alive Fest</h1>
    <div class="countdown">
        <div class="box">
            <div id="days" class="number">00</div>
            <div class="label">JOURS</div>
        </div>

        <div class="box">
            <div id="hours" class="number">00</div>
            <div class="label">HEURES</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">00</div>
            <div class="label">MINUTES</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">00</div>
            <div class="label">SECONDES</div>
        </div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            const targetDate = new Date(2026, 3, 30, 23, 59, 59);
            const diff = targetDate - now;
            if (diff < 0) {
                document.getElementById("days").textContent = "00";
                document.getElementById("hours").textContent = "00";
                document.getElementById("minutes").textContent = "00";
                document.getElementById("seconds").textContent = "00";
            };
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            document.getElementById("days").textContent = String(days).padStart(2, '0');
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
